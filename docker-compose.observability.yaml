version: "3.9"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: aappmart-prometheus
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yml
      - ./alerts/alerts.yaml:/etc/prometheus/alerts.yaml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - observability

  alertmanager:
    image: prom/alertmanager:latest
    container_name: aappmart-alertmanager
    volumes:
      - ./alerts/alerts.yaml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: aappmart-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana_dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    networks:
      - observability

  loki:
    image: grafana/loki:2.9.0
    container_name: aappmart-loki
    ports:
      - "3100:3100"
    volumes:
      - ./logging/logging.yaml:/etc/loki/local-config.yaml
    networks:
      - observability

  promtail:
    image: grafana/promtail:2.9.0
    container_name: aappmart-promtail
    volumes:
      - /var/log:/var/log
      - ./logging/promtail-config.yaml:/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - observability

  otel-collector:
    image: otel/opentelemetry-collector:latest
    container_name: aappmart-otel-collector
    volumes:
      - ./tracing/otel-config.yaml:/etc/otel/config.yaml
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    networks:
      - observability

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: aappmart-jaeger
    volumes:
      - ./tracing/jaeger-config.json:/etc/jaeger/config.json
    ports:
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
    networks:
      - observability

  prometheus-exporter:
    build:
      context: ./metrics
    container_name: aappmart-prometheus-exporter
    command: ["python", "prometheus_exporter.py"]
    ports:
      - "8000:8000"
    networks:
      - observability

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: aappmart-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - observability

volumes:
  grafana-data:

networks:
  observability:
    driver: bridge
