name-template: 'v$NEXT_MINOR_VERSION'
tag-template: 'v$NEXT_MINOR_VERSION'

categories:
  - title: 'Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: 'Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
  - title: 'Maintenance'
    labels:
      - 'chore'
      - 'refactor'
      - 'docs'
  - title: 'Infrastructure'
    labels:
      - 'ci'
      - 'infrastructure'
  - title: 'Dependencies'
    labels:
      - 'dependencies'
      - 'security'

change-template: '- $TITLE by @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: ['major']
  minor:
    labels: ['minor']
  patch:
    labels: ['patch']
  default: patch

template: |
  ## Changelog
  $CHANGES

  ### Contributors
  $CONTRIBUTORS
