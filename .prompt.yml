schemaVersion: 1
name: Text Summarizer
version: 1.0.0
owner: "Secwexen"
createdAt: "2026-02-25"
description: Summarizes input text concisely
tags:
  - summarization
  - text-processing

model: microsoft/phi-4-reasoning
modelParameters:
  max_completion_tokens: 2048
  temperature: 0.3
  top_p: 0.9
  stop: "END"

responseFormat: json_object
  
messages:
  - role: system
    content: >-
      You summarize text and return the result as a JSON object with a single key: "summary".
      Your output must always follow the required JSON format.
  - role: user
    content: |
      Summarize the given text, beginning with "Summary -":
      <text>
      {{input}}
      </text>
testData:
  - input: |
      The quick brown fox jumped over the lazy dog.
      The dog was too tired to react.
    expected:
      summary: "Summary - A fox jumped over a lazy, unresponsive dog."

evaluators:
  - name: Output should start with 'Summary -'
    string:
      startsWith: "Summary -"

  - name: Output must be valid JSON
    json: {}

  - name: Output must contain the key 'summary'
    json:
      contains: "summary"

  - name: Output must not contain extra keys
    json:
      onlyContains: ["summary"]

