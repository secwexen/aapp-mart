[pytest]
minversion = 7.0

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -v --tb=short --strict-markers --cov --cov-report=term-missing

log_cli = true
log_cli_level = INFO

markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow tests

norecursedirs = 
    .git
    __pycache__
    build
    dist
