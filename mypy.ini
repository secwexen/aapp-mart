[mypy]
python_version = 3.11          # Supported Python version
strict = True                  # Enable all strict type checks
ignore_missing_imports = True  # Ignore packages without type hints
disallow_untyped_defs = True   # Disallow functions without type annotations
warn_unused_ignores = True     # Warn on unnecessary ignores
warn_return_any = True         # Warn on functions returning Any
